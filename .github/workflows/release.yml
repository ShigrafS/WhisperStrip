name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore

      - name: Publish (win-x64 single file)
        run: >
          dotnet publish
          -c Release
          -r win-x64
          --self-contained true
          /p:PublishSingleFile=true
          /p:PublishReadyToRun=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          -o publish

      - name: Zip artifact
        shell: pwsh
        run: |
          Get-ChildItem -Path publish -Exclude *.pdb | Compress-Archive -DestinationPath WhisperStrip-win-x64.zip

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: WhisperStrip-win-x64.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
